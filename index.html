<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Kitchens</title>
    <!-- आइकॉन के लिए FontAwesome CSS -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- प्रोफेशनल हेडर और कार्ट आइकॉन -->
    <header class="navbar">
        <div class="logo">Tasty Kitchens</div>
        <div class="cart-icon-container">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <!-- मेनू सेक्शन -->
    <main class="menu-container">
        <!-- फूड कार्ड -->
        <div class="card">
            <div class="image-container">
                <img src="https://unsplash.com" alt="Veg Pizza">
            </div>
            <div class="card-info">
                <h2>Veg Pizza</h2>
                <p class="price">₹199</p>
                <button onclick="addCart()">Add to Cart</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
